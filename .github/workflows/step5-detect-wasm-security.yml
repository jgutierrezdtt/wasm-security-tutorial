name: "Paso 5: Audit en CI"
on:
  push:
    paths:
      - '.github/workflows/wasm-audit.yml'
jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verificar paso actual
        run: grep -q "Paso 5 de 10" README.md
      - name: Verificar artefacto
        run: test -f ".github/workflows/wasm-audit.yml"

      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const next = fs.readFileSync('.github/steps/step6.md', 'utf8');
            const { owner, repo } = context.repo;
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo,
              path: 'README.md',
              message: 'paso 6: desbloqueado',
              content: Buffer.from(next).toString('base64'),
              sha: (await github.rest.repos.getContent({ owner, repo, path: 'README.md' })).data.sha
            });
